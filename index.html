<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>便利店一站式全套厂家货源 | 设备采购平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #c72a2a 0%, #2c7840 45%, #1a4d8c 100%);
            background-attachment: fixed;
            color: #1e2a3a;
            line-height: 1.5;
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px 50px;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 35px;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 70px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
        }
        .hero-section h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #b91c1c, #2b6e3c, #0f4c81);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
        .hero-section p {
            font-size: 1.2rem;
            color: #2c3e50;
            font-weight: 500;
        }
        .hero-badge {
            display: inline-block;
            background: #f7b32b;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 15px;
            color: #2d2f36;
        }

        /* 轮播 */
        .carousel-wrapper {
            position: relative;
            width: 100%;
            border-radius: 32px;
            overflow: hidden;
            margin-bottom: 55px;
            box-shadow: 0 25px 35px rgba(0, 0, 0, 0.25);
        }
        .carousel-container {
            position: relative;
            width: 100%;
            background: #000;
        }
        .carousel-slide {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .slide-item {
            min-width: 100%;
        }
        .slide-item img {
            width: 100%;
            height: 420px;
            object-fit: cover;
            display: block;
            background: #e9ecef;
        }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.55);
            color: white;
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            z-index: 15;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        .carousel-btn:hover {
            background: #e63946;
        }
        .prev { left: 20px; }
        .next { right: 20px; }
        .dots {
            position: absolute;
            bottom: 18px;
            width: 100%;
            text-align: center;
            z-index: 15;
        }
        .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin: 0 7px;
            background: rgba(255,255,240,0.6);
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }
        .dot.active {
            background: #ffc857;
            transform: scale(1.25);
        }

        /* 分类标题 */
        .section-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin: 45px 0 25px 0;
            border-bottom: 3px solid #ffcd7e;
            padding-bottom: 12px;
        }
        .section-header h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .section-header span {
            color: #fff3cf;
            font-weight: 500;
        }

        /* 产品网格 */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 32px;
            margin-bottom: 45px;
        }
        .product-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 32px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 28px 38px rgba(0, 0, 0, 0.25);
        }
        .card-img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            background: #f4f2ee;
        }
        .card-content {
            padding: 20px 22px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #b73b2c;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .price-tag {
            font-size: 1.2rem;
            background: #ffeed9;
            padding: 4px 14px;
            border-radius: 60px;
            color: #bb2e1e;
            font-weight: 700;
        }
        .feature-list-sm {
            margin: 15px 0 20px;
            padding-left: 20px;
            list-style: none;
        }
        .feature-list-sm li {
            margin-bottom: 8px;
            font-size: 0.9rem;
            position: relative;
            padding-left: 22px;
            color: #2c3e4e;
        }
        .feature-list-sm li:before {
            content: "✓";
            color: #2c7a2d;
            font-weight: bold;
            position: absolute;
            left: 0;
            font-size: 1rem;
        }
        .inquiry-btn {
            background: #f0b429;
            color: #2d2f36;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
        }
        .inquiry-btn:hover {
            background: #dd9d1a;
        }

        /* 优势区域 */
        .advantage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 28px;
            margin: 40px 0 50px;
        }
        .advantage-card {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            padding: 28px 20px;
            border-radius: 38px;
            text-align: center;
            color: white;
            transition: 0.2s;
            border: 1px solid rgba(255,215,130,0.5);
        }
        .advantage-card i {
            font-size: 3rem;
            color: #ffcd7e;
            margin-bottom: 16px;
        }
        .advantage-card h4 {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        /* 底部联系栏 */
        .contact-footer {
            background: linear-gradient(110deg, #0a2f44, #1f4e3c);
            border-radius: 48px;
            padding: 35px 25px;
            margin-top: 45px;
            text-align: center;
            color: white;
            box-shadow: 0 12px 28px rgba(0,0,0,0.3);
        }
        .contact-footer h3 {
            font-size: 1.9rem;
            margin-bottom: 12px;
        }
        .wx-qrcode {
            width: 150px;
            height: 150px;
            margin: 18px auto;
            display: block;
            border-radius: 24px;
            border: 3px solid #ffcf4a;
            object-fit: cover;
            background: white;
        }
        .hotline {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        @media (max-width: 780px) {
            .main-container { padding: 15px; }
            .hero-section h1 { font-size: 1.8rem; }
            .slide-item img { height: 260px; }
            .section-header h2 { font-size: 1.6rem; }
        }
        button { cursor: pointer; }
    </style>
</head>
<body>
<div class="main-container">

    <!-- 底部联系 -->

        <h3><i class="fas fa-phone-alt"></i> 立即咨询 获取报价清单</h3>

        <p>专业顾问1对1 · 免费上门测量 · 提供全套方案</p>
        <img class="wx-qrcode" src="https://cdn.phototourl.com/free/2026-03-31-203869b5-cbe5-4830-95b8-0bac1c008626.jpg" alt="微信二维码" onerror="this.src='https://placehold.co/150x150?text=加微信咨询'">
        <p style="margin-top: 12px;">扫码添加好友，领取开店资料包</p>
    </div>
</div>

<script>
    // ---------- 产品数据 (图片可在此处替换) ----------
    let productDatabase = [
        {
            id: "pos_sys",
            name: "收银系统 (含收银机)",
            price: "4999元 (含高端收银机)",
            desc: `<ul class="feature-list-sm"><li>✅ 收银简单（老人、小孩都可10秒上手）</li><li>✅ 直接对接美宜佳、天福等大型供应链，进销存可控可查</li><li>✅ 连锁终生系统，一次购买终身享用，无捆绑</li><li>✅ 支持小票打印、商品价格标签打印（超实用）</li><li>✅ SKU庞大数据支持，全品类识别商品</li></ul>`,
            img: "https://cdn.phototourl.com/free/2026-03-31-ab2b8e58-412e-4a94-8b7d-8e2149b42e62.jpg"
        },
        {
            id: "shelf_std",
            name: "便利店专用货架",
            price: "30-50平方 = 4000元 - 8000元",
            desc: `<ul class="feature-list-sm"><li>▪ 加厚钢材，单层承重80kg，耐用不变形</li><li>▪ 多层调节设计，空间利用率提高40%</li><li>▪ 免费上门测量+布局设计，包安装</li><li>▪ 适用零食、饮料、日化全品类展示</li></ul>`,
            img: "https://cdn.phototourl.com/free/2026-03-31-d584db0f-cba5-4589-87cf-2fb248c308a5.jpg"
        },
        {
            id: "counter_tobacco",
            name: "收银台 + 烟酒柜组合",
            price: "2500元 - 12000元 (定制尺寸)",
            desc: `<ul class="feature-list-sm"><li>✨ 高端实木/钢化玻璃材质，提升店铺档次</li><li>✨ 一体化设计，含抽屉、储物柜、烟架酒架</li><li>✨ 适配10-80㎡店铺，免费出图</li><li>✨ 增加陈列档次，促进烟酒消费</li></ul>`,
            img: "https://cdn.phototourl.com/free/2026-03-31-c0f19b3c-ad63-4dda-b880-b50420901f1c.jpg"
        },
        {
            id: "freezer",
            name: "商用冰柜/冷藏展示柜",
            price: "4000元 - 13000元 (多容积可选)",
            desc: `<ul class="feature-list-sm"><li>❄️ 品牌压缩机，静音节能，制冷效率高</li><li>❄️ 立式/卧式/风幕柜/双温可选</li><li>❄️ 适合饮料、雪糕、速冻、鲜食</li><li>❄️ 全国联保，售后极速响应</li></ul>`,
            img: "https://cdn.phototourl.com/free/2026-03-31-c8a473c7-6760-4d8e-afab-9bafe5f304b9.jpg"
        },
        {
            id: "decoration",
            name: "连锁品牌整店装修",
            price: "30-50平方 = 30000元 - 50000元",
            desc: `<ul class="feature-list-sm"><li>🎨 一站式全包：设计+施工+主材+软装</li><li>🎨 连锁级SI标准，门头/地面/灯光/招牌统一</li><li>🎨 15天高效完工，不影响开业计划</li><li>🎨 提供3D效果图，所见即所得</li></ul>`,
            img: "https://cdn.phototourl.com/free/2026-03-31-74b36f78-f17c-4f33-bc6b-c463a93c8ad2.jpg"
        },
        {
            id: "cctv_extra",
            name: "智能监控安防系统",
            price: "2000元 - 5800元",
            desc: `<ul class="feature-list-sm"><li>📹 400万超清红外夜视，手机远程查看</li><li>📹 AI人形侦测，异常报警推送</li><li>📹 30天云存储+硬盘录像双备份</li><li>📹 防盗防损，开店安心</li></ul>`,
            img: "https://cdn.phototourl.com/free/2026-03-31-817787c0-917b-48a6-a694-b726a47dcb12.png"
        },
        {
            id: "heater_snack",
            name: "关东煮/热食设备",
            price: "1500元 - 4500元",
            desc: `<ul class="feature-list-sm"><li>🍢 关东煮机+热狗肠机+蒸包柜组合</li><li>🍢 食品级不锈钢，温控精准</li><li>🍢 提升鲜食毛利50%，吸引客流</li><li>🍢 易清洁设计，操作简单</li></ul>`,
            img: "https://cdn.phototourl.com/free/2026-03-31-82c3e5fa-4b9f-4904-9ae4-a92519efe3a0.png"
        }
    ];

    // 轮播图数组 (图1-4) —— 在此替换您的图片链接
    const carouselImages = [
        "https://cdn.phototourl.com/free/2026-03-31-83401c57-9d16-48e6-9d39-e8ca9c4067bf.png",
        "https://cdn.phototourl.com/free/2026-03-31-817787c0-917b-48a6-a694-b726a47dcb12.png",
        "https://cdn.phototourl.com/free/2026-03-31-82c3e5fa-4b9f-4904-9ae4-a92519efe3a0.png",
        "https://cdn.phototourl.com/free/2026-03-31-203869b5-cbe5-4830-95b8-0bac1c008626.jpg"
    ];

    // 渲染产品
    function renderProducts() {
        const grid = document.getElementById("productsGrid");
        if (!grid) return;
        grid.innerHTML = "";
        productDatabase.forEach(prod => {
            const card = document.createElement("div");
            card.className = "product-card";
            const imgSrc = prod.img || "https://placehold.co/600x400?text=设备实拍";
            card.innerHTML = `
                <img class="card-img" src="${imgSrc}" alt="${prod.name}" onerror="this.src='https://placehold.co/600x400?text=图片加载中'">
                <div class="card-content">
                    <div class="card-title">
                        ${escapeHtml(prod.name)}
                        <span class="price-tag">${escapeHtml(prod.price)}</span>
                    </div>
                    <div class="product-desc">${prod.desc || '<ul class="feature-list-sm"><li>点击编辑完善详细功能</li></ul>'}</div>
                    <button class="inquiry-btn" data-name="${escapeHtml(prod.name)}"><i class="fas fa-comment-dots"></i> 立即询价</button>
                </div>
            `;
            grid.appendChild(card);
        });

        // 绑定询价按钮
        document.querySelectorAll(".inquiry-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const name = btn.getAttribute("data-name");
                alert(`✨ 已为您记录需求，专业顾问将联系您！\n商品：${name}\n咨询热线：15360189789`);
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    // 轮播逻辑
    let currentIndex = 0;
    let slideContainer, dotsContainer, autoInterval;
    let totalSlides = carouselImages.length;

    function buildCarousel() {
        const slideWrap = document.getElementById("carouselSlide");
        if (!slideWrap) return;
        slideWrap.innerHTML = "";
        carouselImages.forEach((src, idx) => {
            const slideDiv = document.createElement("div");
            slideDiv.className = "slide-item";
            const img = document.createElement("img");
            img.src = src;
            img.alt = `便利店场景图${idx+1}`;
            img.onerror = function() { this.src = "https://placehold.co/1200x420?text=场景示意"; };
            slideDiv.appendChild(img);
            slideWrap.appendChild(slideDiv);
        });
        const dotsDiv = document.getElementById("dotsContainer");
        dotsDiv.innerHTML = "";
        for (let i = 0; i < totalSlides; i++) {
            const dot = document.createElement("span");
            dot.classList.add("dot");
            if (i === currentIndex) dot.classList.add("active");
            dot.addEventListener("click", () => {
                currentIndex = i;
                updateCarousel();
                resetAutoPlay();
            });
            dotsDiv.appendChild(dot);
        }
        updateCarousel();
    }

    function updateCarousel() {
        const slideWrap = document.getElementById("carouselSlide");
        if (slideWrap) {
            slideWrap.style.transform = `translateX(-${currentIndex * 100}%)`;
            const dots = document.querySelectorAll(".dot");
            dots.forEach((dot, idx) => {
                if (idx === currentIndex) dot.classList.add("active");
                else dot.classList.remove("active");
            });
        }
    }

    function nextSlide() { currentIndex = (currentIndex + 1) % totalSlides; updateCarousel(); resetAutoPlay(); }
    function prevSlide() { currentIndex = (currentIndex - 1 + totalSlides) % totalSlides; updateCarousel(); resetAutoPlay(); }
    function resetAutoPlay() {
        if (autoInterval) clearInterval(autoInterval);
        autoInterval = setInterval(() => { nextSlide(); }, 4500);
    }

    function bindCarouselEvents() {
        const prev = document.getElementById("prevBtn");
        const next = document.getElementById("nextBtn");
        if (prev) prev.addEventListener("click", prevSlide);
        if (next) next.addEventListener("click", nextSlide);
    }

    function init() {
        renderProducts();
        buildCarousel();
        bindCarouselEvents();
        resetAutoPlay();
    }
    init();
</script>
</body>
</html>
